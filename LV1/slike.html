<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Galerija Netflix naslova s Lightbox efektom.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style_slike.css">
    <title>Netflix - Galerija</title>
</head>
<body class="netflix-theme">
    <header>
        <div class="logo">NETFLIX <span class="sub-logo">Gallery</span></div>
        <div class="nav-container">
            <button class="menu-btn">IZBORNIK</button>
            <nav role="navigation" aria-label="Glavna navigacija" class="dropdown-nav">
                <ul class="nav-menu">
                    <li><a href="index.html">Početna</a></li>
                    <li><a href="slike.html">Galerija</a></li>
                    <li><a href="grafikon.html">Grafikon</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="galerija"> 
            <h1>Galerija slika</h1>
            <div class="img-gallery-magnific">
                <figure class="galerija_slika magnific-img">
                    <a href="#img1">
                        <img src="https://unsplash.it/300/200?random=1" alt="Slika 1" loading="lazy">
                    </a>
                    <figcaption>Slika 1</figcaption>
                </figure>
                <div id="img1" class="lightbox">
                    <a href="#" class="close">&times;</a>
                    <img src="https://unsplash.it/900/600?random=1" alt="Velika slika 1">
                </div>

                <figure class="galerija_slika magnific-img"><a href="#img2"><img src="https://unsplash.it/300/200?random=2" loading="lazy"></a><figcaption>Slika 2</figcaption></figure>
                <div id="img2" class="lightbox"><a href="#" class="close">&times;</a><img src="https://unsplash.it/900/600?random=2"></div>
                
                <figure class="galerija_slika magnific-img"><a href="#img3"><img src="https://unsplash.it/300/200?random=3" loading="lazy"></a><figcaption>Slika 3</figcaption></figure>
                <div id="img3" class="lightbox"><a href="#" class="close">&times;</a><img src="https://unsplash.it/900/600?random=3"></div>

                <figure class="galerija_slika magnific-img"><a href="#img16"><img src="https://unsplash.it/300/200?random=16" loading="lazy"></a><figcaption>Slika 16</figcaption></figure>
                <div id="img16" class="lightbox"><a href="#" class="close">&times;</a><img src="https://unsplash.it/900/600?random=16"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026. Web Programiranje - LV1. Sva prava pridržana.</p>
    </footer>
</body>
</html>
